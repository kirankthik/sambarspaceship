{{ define "main" }}
<article class="comic-page">

  <!-- Comic title bar — like a mission briefing header -->
  <div class="comic-header">
    <h1 class="comic-title">{{ .Title }}</h1>
    <div class="comic-meta">
      <span class="meta-item">
        <span class="meta-label">TRANSMISSION DATE:</span>
        <span class="meta-value">{{ .Date.Format "2006.01.02" }}</span>
      </span>
      {{ with .Params.tags }}
      <span class="meta-item">
        <span class="meta-label">TAGS:</span>
        <span class="meta-value">{{ delimit . " / " }}</span>
      </span>
      {{ end }}
    </div>
  </div>

  <!-- The comic image — main viewport -->
  {{ with .Params.comicImage }}
  <div class="comic-frame">
    <div class="frame-corner frame-tl"></div>
    <div class="frame-corner frame-tr"></div>
    <div class="frame-corner frame-bl"></div>
    <div class="frame-corner frame-br"></div>
    <img src="{{ . }}" alt="{{ $.Title }}" class="comic-art" loading="lazy">
  </div>
  {{ end }}

  <!-- Written content below the comic -->
  {{ if .Content }}
  <div class="comic-body">
    {{ .Content }}
  </div>
  {{ end }}

  <!-- Navigation back -->
  <div class="comic-nav">
    <a href="/comics/" class="nav-btn">◀ BACK TO COMICS</a>
  </div>

</article>
{{ end }}
